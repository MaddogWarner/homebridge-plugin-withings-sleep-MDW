version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # eslint-plugin-vitest 0.5.x has a circular reference incompatible with ESLint 8 legacy config
      - dependency-name: "eslint-plugin-vitest"
    groups:
      dev-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
